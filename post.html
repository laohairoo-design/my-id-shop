<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงขายสินค้า</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-md mx-auto bg-white rounded-[2.5rem] p-8 shadow-xl">
        <h2 class="text-2xl font-black mb-6">ลงขายไอดีใหม่</h2>
        <input id="title" type="text" placeholder="ชื่อไอดี (เช่น RoV สกินเทพ)" class="w-full p-4 border rounded-2xl mb-3 bg-slate-50 font-bold">
        <input id="price" type="number" placeholder="ราคา (บาท)" class="w-full p-4 border rounded-2xl mb-3 bg-slate-50 font-bold">
        <input id="img-url" type="text" placeholder="ลิงก์รูปภาพ (จาก ImgBB)" class="w-full p-4 border rounded-2xl mb-3 bg-slate-50 font-bold">
        <textarea id="contact" placeholder="ข้อมูลไอดี (ID:PASS) จะโชว์หลังคนซื้อจ่ายเงิน" class="w-full p-4 border rounded-2xl mb-4 bg-slate-50 font-bold h-32"></textarea>
        <button onclick="postItem()" class="w-full bg-black text-white font-black py-4 rounded-2xl mb-2">ลงขายทันที</button>
        <button onclick="location.href='index.html'" class="w-full text-slate-400 font-bold">ยกเลิก</button>
    </div>
    <script type="module" src="app.js"></script>
</body>
</html>
