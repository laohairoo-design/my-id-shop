
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium ID Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hero-gradient { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); }
    </style>
</head>
<body>
    <nav class="glass sticky top-0 z-50 px-4 py-3 border-b border-white/5">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-black uppercase">GAME<span class="text-yellow-500">SHOP</span></h1>
            <div id="user-display" class="glass px-4 py-2 rounded-2xl flex items-center gap-3 cursor-pointer" onclick="location.href='profile.html'">
                <div class="text-right">
                    <p id="client-name" class="text-[10px] font-bold text-slate-400">Loading...</p>
                    <p id="client-balance" class="text-sm font-black text-yellow-500 italic">฿ 0.00</p>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4">
        <div id="product-list" class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6 pb-24"></div>
    </main>

    <div id="login-modal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[100] hidden flex items-center justify-center p-6">
        <div class="glass w-full max-w-sm rounded-[3rem] p-10 text-center">
            <h2 class="text-2xl font-black mb-6 italic">เข้าสู่ระบบ</h2>
            <input id="user-input-name" type="text" placeholder="ชื่อเล่นของคุณ" class="w-full p-5 glass rounded-2xl mb-4 text-center font-bold outline-none border border-white/10 text-white">
            <button onclick="loginCustomer()" class="w-full hero-gradient text-black font-black py-5 rounded-2xl shadow-xl">ตกลง</button>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
